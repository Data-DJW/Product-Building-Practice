<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tetris</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>TETRIS</h1>
            <button id="theme-toggle" class="icon-btn">
                <i class="fas fa-moon"></i>
            </button>
        </header>
        
        <main>
            <div class="board-wrapper">
                <canvas id="tetris-board"></canvas>
                <div id="game-overlay" class="overlay hidden">
                    <div class="overlay-content">
                        <h2 id="overlay-title">GAME OVER</h2>
                        <button id="restart-btn" class="primary-btn">다시 시작</button>
                    </div>
                </div>
            </div>
            
            <aside class="side-panel">
                <div class="panel-section">
                    <h3>NEXT</h3>
                    <div class="next-wrapper">
                        <canvas id="next-piece"></canvas>
                    </div>
                </div>
                
                <div class="panel-section">
                    <div class="stat-item">
                        <span class="label">SCORE</span>
                        <span id="score" class="value">000000</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">LEVEL</span>
                        <span id="level" class="value">1</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">LINES</span>
                        <span id="lines" class="value">0</span>
                    </div>
                </div>
                
                <div class="panel-section controls">
                    <button id="start-btn" class="primary-btn">START</button>
                    <p class="hint">방향키: 이동/회전<br>Space: 하드 드롭</p>
                </div>
            </aside>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
