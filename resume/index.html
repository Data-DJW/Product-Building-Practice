<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Resume | Cobalt & Black</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Inter Font Family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <nav class="nav-container">
                <div class="logo">AUSTIN<span class="dot">.</span></div>
                <ul class="nav-links">
                    <li><a href="#bio">Austin</a></li>
                    <li><a href="#career">Career</a></li>
                    <li><a href="#inquiry">Contact Me</a></li>
                </ul>
            </nav>
        </header>

        <main class="content-wrapper">
            <section id="bio" class="section-container">
                <resume-bio></resume-bio>
            </section>
            
            <section id="career" class="section-container bg-dark-alt">
                <div class="section-header">
                    <h2 class="section-title">Career Experience</h2>
                    <div class="title-underline"></div>
                </div>
                <resume-career></resume-career>
            </section>
            
            <section id="inquiry" class="section-container">
                <div class="section-header">
                    <h2 class="section-title">Contact Me</h2>
                    <div class="title-underline"></div>
                </div>
                <resume-inquiry></resume-inquiry>
            </section>
        </main>

        <footer class="main-footer">
            <p>&copy; 2026 H1 Resume. All Rights Reserved.</p>
        </footer>
    </div>
    
    <script src="main.js" type="module"></script>
</body>
</html>
